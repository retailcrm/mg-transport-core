version: "2"

run:
  modules-download-mode: readonly
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - lll
    - makezero
    - misspell
    - mnd
    - nestif
    - prealloc
    - predeclared
    - revive
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dogsled:
      max-blank-identifiers: 3
    dupl:
      threshold: 200
    errorlint:
      errorf: true
    exhaustive:
      default-signifies-exhaustive: false
    funlen:
      lines: 65
      statements: 50
    gocognit:
      min-complexity: 25
    gocyclo:
      min-complexity: 25
    govet:
      disable-all: true
      enable:
        - assign
        - atomic
        - bools
        - buildtag
        - copylocks
        - httpresponse
        - loopclosure
        - lostcancel
        - printf
        - shift
        - stdmethods
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
      settings:
        printf:
          funcs:
            - (*log.Logger).Fatal
            - (*log.Logger).Fatalf
            - (*log.Logger).Fatalln
            - (*log.Logger).Panic
            - (*log.Logger).Panicf
            - (*log.Logger).Panicln
            - (*log.Logger).Print
            - (*log.Logger).Printf
            - (*log.Logger).Println
            - (*testing.common).Error
            - (*testing.common).Errorf
            - (*testing.common).Fatal
            - (*testing.common).Fatalf
            - (*testing.common).Log
            - (*testing.common).Logf
            - (*testing.common).Skip
            - (*testing.common).Skipf
            - (testing.TB).Error
            - (testing.TB).Errorf
            - (testing.TB).Fatal
            - (testing.TB).Fatalf
            - (testing.TB).Log
            - (testing.TB).Logf
            - (testing.TB).Skip
            - (testing.TB).Skipf
            - fmt.Errorf
            - fmt.Fprint
            - fmt.Fprintf
            - fmt.Fprintln
            - fmt.Print
            - fmt.Printf
            - fmt.Println
            - fmt.Sprint
            - fmt.Sprintf
            - fmt.Sprintln
            - log.Fatal
            - log.Fatalf
            - log.Fatalln
            - log.Panic
            - log.Panicf
            - log.Panicln
            - log.Print
            - log.Printf
            - log.Println
            - runtime/trace.Logf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Fatalf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Panicf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Panicf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Criticalf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Errorf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Warningf
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Noticef
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Infof
            - (github.com/retailcrm/mg-transport-core/core.LoggerInterface).Debugf
    lll:
      line-length: 120
    misspell:
      locale: US
    nestif:
      min-complexity: 5
    unparam:
      check-exported: false
    whitespace:
      multi-if: false
      multi-func: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - godot
          - ineffassign
          - lll
          - makezero
          - misspell
          - mnd
          - sqlclosecheck
          - unused
          - whitespace
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: true

severity:
  default: error

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/retailcrm/mg-transport-api-client-go
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
